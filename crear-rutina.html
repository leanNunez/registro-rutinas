<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPlan — Crear rutina</title>
  <link rel="stylesheet" href="estilos.css" />
</head>
<body class="fondo-2">

  <!-- ===== BARRA DE NAVEGACIÓN ===== -->
  <nav class="barra">
    <div class="barra__logo">FitPlan</div>
    <div class="barra__enlaces">
      <a href="index.html">Inicio</a>
      <a href="crear-rutina.html" class="activo">Crear rutina</a>
      <a href="historial.html">Historial</a>
    </div>
  </nav>

  <!-- pagina--dos-columnas activa el layout de dos columnas sin afectar historial.html -->
  <main class="pagina pagina--dos-columnas">

    <!-- ===== COLUMNA IZQUIERDA: selector y datos (siempre visibles) ===== -->
    <div class="pagina__izquierda">
      <h1>Crear rutina</h1>
      <p>Elegí una persona para ver sus datos y armarle el plan.</p>

      <!-- 1) ELEGIR PERSONA -->
      <section class="bloque">
        <label for="selector-persona">Persona</label>
        <select id="selector-persona"></select>
      </section>

      <!-- 2) DATOS DE LA PERSONA -->
      <section class="bloque">
        <h2>Datos</h2>
        <div id="datos-persona"></div>
      </section>
    </div>

    <!-- ===== COLUMNA DERECHA: tabs ===== -->
    <div class="pagina__derecha">
      <div class="tabs">

        <!-- Botones de navegación -->
        <div class="tabs__nav">
          <button type="button" class="tabs__btn tabs__btn--activo" data-tab="persona">Agregar persona</button>
          <button type="button" class="tabs__btn" data-tab="rutinas">Rutinas</button>
          <button type="button" class="tabs__btn" data-tab="ejercicios">Ejercicios</button>
          <button type="button" class="tabs__btn" data-tab="dieta">Dieta</button>
        </div>

        <!-- 3) PANEL: AGREGAR PERSONA -->
        <div class="tabs__panel bloque activo" id="tab-persona">
          <h2>Agregar persona</h2>
          <form id="formulario-persona">
            <label for="persona-nombre">Nombre completo</label>
            <input type="text" id="persona-nombre" placeholder="Ej: Lucía Fernández" />

            <label for="persona-edad">Edad</label>
            <input type="number" id="persona-edad" placeholder="28" />

            <label for="persona-peso">Peso (kg)</label>
            <input type="number" id="persona-peso" placeholder="64" />

            <label for="persona-estatura">Estatura (cm)</label>
            <input type="number" id="persona-estatura" placeholder="168" step="1" />

            <label for="persona-objetivo">Objetivo</label>
            <input type="text" id="persona-objetivo" placeholder="Ej: Ganar fuerza" />

            <button type="submit">Agregar persona</button>
          </form>
        </div>

        <!-- 4) PANEL: RUTINAS -->
        <div class="tabs__panel bloque" id="tab-rutinas">
          <h2>Rutinas</h2>
          <form id="formulario-rutina">
            <label for="rutina-nombre">Nombre de la rutina</label>
            <input type="text" id="rutina-nombre" placeholder="Ej: Fuerza superior" />

            <fieldset>
              <legend>Días</legend>
              <label><input type="checkbox" name="dia" value="Lunes" /> Lunes</label>
              <label><input type="checkbox" name="dia" value="Martes" /> Martes</label>
              <label><input type="checkbox" name="dia" value="Miércoles" /> Miércoles</label>
              <label><input type="checkbox" name="dia" value="Jueves" /> Jueves</label>
              <label><input type="checkbox" name="dia" value="Viernes" /> Viernes</label>
              <label><input type="checkbox" name="dia" value="Sábado" /> Sábado</label>
              <label><input type="checkbox" name="dia" value="Domingo" /> Domingo</label>
            </fieldset>

            <button type="submit">Agregar rutina</button>
            <button type="button" id="btn-cancelar-edicion" style="display:none">Cancelar edición</button>
          </form>
          <div id="lista-rutinas"></div>
        </div>

        <!-- 5) PANEL: EJERCICIOS -->
        <div class="tabs__panel bloque" id="tab-ejercicios">
          <h2>Ejercicios</h2>

          <label for="selector-rutina">Rutina</label>
          <select id="selector-rutina"></select>

          <!-- 5a) Título de cada día: ej. "Lunes → Pecho y Bíceps" -->
          <h3 class="subtitulo-seccion">Títulos de días</h3>
          <form id="formulario-titulo-dia">
            <label for="selector-dia-titulo">Día</label>
            <select id="selector-dia-titulo"></select>

            <label for="input-titulo-dia">Título del día</label>
            <input type="text" id="input-titulo-dia" placeholder="Ej: Pecho y Bíceps" />

            <button type="submit">Guardar título</button>
          </form>
          <div id="lista-titulos-dia"></div>

          <!-- 5b) Agregar ejercicio con día y grupo muscular -->
          <h3 class="subtitulo-seccion">Agregar ejercicio</h3>
          <form id="formulario-ejercicio">
            <label for="ejercicio-dia">Día</label>
            <select id="ejercicio-dia"></select>

            <label for="ejercicio-grupo">Grupo muscular</label>
            <input type="text" id="ejercicio-grupo" placeholder="Ej: Pecho" />

            <label for="ejercicio-nombre">Nombre del ejercicio</label>
            <input type="text" id="ejercicio-nombre" placeholder="Ej: Press de banca" />

            <label for="ejercicio-series">Series</label>
            <input type="number" id="ejercicio-series" placeholder="4" />

            <label for="ejercicio-repeticiones">Repeticiones</label>
            <input type="number" id="ejercicio-repeticiones" placeholder="10" />

            <label for="ejercicio-descanso">Descanso</label>
            <input type="text" id="ejercicio-descanso" placeholder="Ej: 90 seg" />

            <button type="submit" id="btn-submit-ejercicio">Agregar ejercicio</button>
            <button type="button" id="btn-cancelar-edicion-ejercicio" style="display:none">Cancelar edición</button>
          </form>

          <div id="lista-ejercicios"></div>
        </div>

        <!-- 6) PANEL: DIETA -->
        <div class="tabs__panel bloque" id="tab-dieta">
          <h2>Dieta</h2>
          <form id="formulario-dieta">
            <label for="dieta-momento">Momento</label>
            <input type="text" id="dieta-momento" placeholder="Ej: Desayuno" />

            <label for="dieta-descripcion">Descripción</label>
            <input type="text" id="dieta-descripcion" placeholder="Ej: Avena con frutas" />

            <button type="submit">Agregar a la dieta</button>
          </form>
          <div id="lista-dieta"></div>
        </div>

      </div><!-- /tabs -->
    </div><!-- /pagina__derecha -->

    <!-- ===== COLUMNA DERECHA: preview de la rutina en construcción ===== -->
    <div class="pagina__preview">
      <p class="preview__titulo">Vista previa</p>

      <!-- Tarjeta que refleja el estado actual del formulario de rutina -->
      <div class="tarjeta-preview">

        <!-- Nombre de la rutina (se actualiza con cada tecla) -->
        <div id="preview-nombre" class="tarjeta-preview__nombre">Sin nombre</div>

        <!-- Pills de días seleccionados -->
        <div id="preview-dias" class="tarjeta-preview__dias"></div>

        <!-- Ejercicios ya guardados en esta rutina -->
        <div class="tarjeta-preview__separador"></div>
        <div id="preview-ejercicios" class="tarjeta-preview__ejercicios">
          <p class="vacio">Sin ejercicios aún</p>
        </div>

        <!-- Dieta guardada de la persona -->
        <div class="tarjeta-preview__separador"></div>
        <div id="preview-dieta" class="tarjeta-preview__dieta">
          <p class="vacio">Sin dieta aún</p>
        </div>

      </div>
    </div><!-- /pagina__preview -->

  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <!-- tabs.js es reutilizable: maneja la navegación de tabs en cualquier página -->
  <script src="js/tabs.js"></script>
  <script src="js/crear-rutina.js"></script>
  <!-- preview-rutina.js: actualiza la tarjeta de preview en tiempo real -->
  <script src="js/preview-rutina.js"></script>
</body>
</html>
